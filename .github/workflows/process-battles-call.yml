name: Call Supabase process-battles (no actions/checkout)

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  call-process-battles:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:

      - name: Runner diagnostics
        run: |
          set -euo pipefail
          echo "Runner: $(uname -a)"
          echo "PWD: $(pwd)"
          ls -la

      - name: Clone repo to /tmp/repo-clone (public repo)
        run: |
          set -euo pipefail
          TARGET_DIR="/tmp/repo-clone"
          REPO="https://github.com/myy614915-droid/revenge.git"
          echo "Cloning $REPO into $TARGET_DIR"
          rm -rf "$TARGET_DIR" || true
          git clone --depth=1 "$REPO" "$TARGET_DIR"
          chmod -R u+rwX "$TARGET_DIR"
          echo "Contents:"
          ls -la "$TARGET_DIR" | sed -n '1,200p'

      - name: Validate secrets presence
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_KEY:-}" ]; then
            echo "ERROR: Required secrets are missing"; exit 1
          fi

      - name: Ensure call script exists & execute
        run: |
          set -euo pipefail
          TARGET_DIR="/tmp/repo-clone"
          SCRIPT="${TARGET_DIR}/scripts/call_process_battles.sh"
          if [ ! -f "$SCRIPT" ]; then
            echo "ERROR: $SCRIPT not found"; exit 1
          fi
          chmod +x "$SCRIPT"
          echo "Running script..."
          bash "$SCRIPT"
