name: Call Supabase process-battles

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  call-process-battles:
    runs-on: ubuntu-latest
    env:
      # These will be populated from repository secrets below into the runtime env
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:

      - name: Runner diagnostics (safe)
        run: |
          set -euo pipefail
          echo "Runner: $(uname -a)"
          echo "User: $(whoami || true)"
          echo "PWD: $(pwd)"
          echo "GITHUB_REPOSITORY='${GITHUB_REPOSITORY:-<unset>}'"
          echo "GITHUB_REF='${GITHUB_REF:-<unset>}'"
          echo "Listing working directory:"
          ls -la || true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Copy repo to /tmp/repo-clone
        run: |
          set -euo pipefail
          TARGET_DIR="/tmp/repo-clone"
          echo "Preparing target dir: $TARGET_DIR"
          rm -rf "$TARGET_DIR" || true
          mkdir -p "$TARGET_DIR"
          # Copy working directory contents (preserves .gitignored state as in runner checkout)
          cp -a . "$TARGET_DIR"
          # Ensure readable & executable where appropriate
          chmod -R u+rwX "$TARGET_DIR"
          echo "Contents of $TARGET_DIR:"
          ls -la "$TARGET_DIR" | sed -n '1,200p'

      - name: Validate secrets presence (safe)
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ]; then
            echo "ERROR: SUPABASE_URL is missing"; exit 1
          fi
          if [ -z "${SUPABASE_KEY:-}" ]; then
            echo "ERROR: SUPABASE_KEY is missing"; exit 1
          fi
          # Print a truncated preview only (avoid leaking secret)
          echo "SUPABASE_URL preview: ${SUPABASE_URL:0:30}..."
          # Basic URL sanity check
          if [[ ! "${SUPABASE_URL}" =~ ^https://[A-Za-z0-9.-]+ ]]; then
            echo "ERROR: SUPABASE_URL doesn't look like https://<project-ref>.supabase.co"; exit 1
          fi

      - name: Ensure call script exists & make executable
        run: |
          set -euo pipefail
          TARGET_DIR="/tmp/repo-clone"
          SCRIPT_PATH="${TARGET_DIR}/scripts/call_process_battles.sh"
          if [ ! -f "$SCRIPT_PATH" ]; then
            echo "ERROR: $SCRIPT_PATH not found. Ensure scripts/call_process_battles.sh exists in the repo."; exit 1
          fi
          chmod +x "$SCRIPT_PATH"
          echo "Script permissions:"
          ls -l "$SCRIPT_PATH"

      - name: Dry-run check (optional, non-destructive)
        run: |
          set -euo pipefail
          TARGET_DIR="/tmp/repo-clone"
          echo "Performing quick dry-run to ensure script executes without network call..."
          # Temporarily run the script but in dry-run mode if it supports it.
          # If your script has no dry-run flag, this step just verifies execution permission.
          (SUPABASE_URL="https://example.supabase.co" SUPABASE_KEY="fakekey" bash -n "$TARGET_DIR/scripts/call_process_battles.sh") || true
          echo "Dry-run syntax check succeeded."

      - name: Call process-battles (with retries)
        env:
          SUPABASE_URL: ${{ env.SUPABASE_URL }}
          SUPABASE_KEY: ${{ env.SUPABASE_KEY }}
        run: |
          set -euo pipefail
          TARGET_DIR="/tmp/repo-clone"
          cd "$TARGET_DIR"
          echo "Invoking $TARGET_DIR/scripts/call_process_battles.sh"
          # The script itself contains retry logic; just invoke it.
          ./scripts/call_process_battles.sh
