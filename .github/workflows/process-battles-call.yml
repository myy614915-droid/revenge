name: Call Supabase process-battles

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # اختياري: تشغيل كل ساعة — عدله أو أزل السطر حسب حاجتك

jobs:
  call-process-battles:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate secrets presence (safe)
        run: |
          if [ -z "${SUPABASE_URL:-}" ]; then
            echo "ERROR: SUPABASE_URL is missing"; exit 1
          fi
          if [ -z "${SUPABASE_KEY:-}" ]; then
            echo "ERROR: SUPABASE_KEY is missing"; exit 1
          fi
          echo "SUPABASE_URL length: ${#SUPABASE_URL}"
          # Print only first 12 chars to avoid leaking secret
          echo "SUPABASE_URL starts with: ${SUPABASE_URL:0:12}"
          # Check basic URL shape
          if [[ ! "${SUPABASE_URL}" =~ ^https://[A-Za-z0-9.-]+(\:[0-9]+)?/?.*$ ]]; then
            echo "ERROR: SUPABASE_URL doesn't look like https://<project-ref>.supabase.co"; exit 1
          fi

      - name: Make call script executable
        run: |
          chmod +x ./scripts/call_process_battles.sh

      - name: Call process-battles (with retries)
        env:
          SUPABASE_URL: ${{ env.SUPABASE_URL }}
          SUPABASE_KEY: ${{ env.SUPABASE_KEY }}
        run: |
          ./scripts/call_process_battles.sh
